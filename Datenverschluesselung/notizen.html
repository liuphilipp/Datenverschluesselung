<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Notizen App</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      background: white;
      padding: 25px;
      border-radius: 16px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      resize: none;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 10px;
      background: #667eea;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #5a67d8;
    }

    #notesContainer {
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
    }

    .note {
      background: #f1f1f1;
      padding: 10px;
      border-radius: 10px;
      margin-top: 8px;
      text-align: left;
    }
  </style>
</head>
<body>

<div class="app">
  <h2>🔐 Notizen</h2>

  <textarea id="noteInput" placeholder="Deine Notiz..."></textarea>
  <input id="password" placeholder="Passwort">

  <button onclick="saveNote()">Speichern</button>
  <button onclick="showNotes()">Anzeigen</button>
  <button onclick="deleteNotes()">Alle löschen</button>

  <div id="notesContainer"></div>
</div>

<script>

function encrypt(text, password) {
  let result = "";
  let shift = password.length;

  for (let i = 0; i < text.length; i++) {
    result += String.fromCharCode(text.charCodeAt(i) + shift);
  }

  return result;
}

function decrypt(text, password) {
  let result = "";
  let shift = password.length;

  for (let i = 0; i < text.length; i++) {
    result += String.fromCharCode(text.charCodeAt(i) - shift);
  }

  return result;
}

function saveNote() {
  let text = document.getElementById("noteInput").value;
  let password = document.getElementById("password").value;

  if (!text || !password) {
    alert("Bitte alles eingeben!");
    return;
  }

  let encrypted = encrypt(text, password);

  let notes = JSON.parse(localStorage.getItem("notes") || "[]");
  notes.push(encrypted);
  localStorage.setItem("notes", JSON.stringify(notes));

  alert("Gespeichert!");
  document.getElementById("noteInput").value = "";
}

function showNotes() {
  let password = document.getElementById("password").value;
  let container = document.getElementById("notesContainer");

  container.innerHTML = "";

  let notes = JSON.parse(localStorage.getItem("notes") || "[]");

  notes.forEach(n => {
    let div = document.createElement("div");
    div.className = "note";
    div.textContent = decrypt(n, password);
    container.appendChild(div);
  });
}

function deleteNotes() {
  localStorage.removeItem("notes");
  document.getElementById("notesContainer").innerHTML = "";
  alert("Alle Notizen gelöscht!");
}

</script>

</body>
</html>
