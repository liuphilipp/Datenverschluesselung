<main class="container mt-5">

<div class="card shadow">
<div class="card-body">

<h1 class="mb-4">🔒 Verschlüsselte Notizen</h1>

<p>
Diese Notizen werden mit AES verschlüsselt gespeichert.  
Nur mit dem richtigen Passwort können sie gelesen werden.
</p>

<div class="mb-3">

<label class="form-label">Passwort eingeben</label>

<input type="password" id="password" class="form-control">

</div>

<button class="btn btn-primary mb-4" onclick="unlockNotes()">
Notizen entsperren
</button>

<div id="notesArea" style="display:none;">

<label class="form-label">Deine Notizen</label>

<textarea id="notes" class="form-control" rows="8"></textarea>

<button class="btn btn-success mt-3" onclick="saveNotes()">
Notizen speichern
</button>

</div>

<p class="mt-3" id="status"></p>

</div>
</div>
