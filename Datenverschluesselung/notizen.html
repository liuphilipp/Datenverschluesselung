<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Notizen App</title>

  <!-- Bootstrap (optional, aber du nutzt navbar Klassen) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      background: white;
      padding: 25px;
      border-radius: 16px;
      width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
      margin-top: 80px; /* wegen navbar */
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: none;
      border-radius: 10px;
      background: #667eea;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #5a67d8;
    }

    #notesContainer {
      margin-top: 15px;
      max-height: 200px;
      overflow-y: auto;
    }

    .note {
      background: #f1f1f1;
      padding: 10px;
      border-radius: 10px;
      margin-top: 8px;
      text-align: left;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
  <div class="container">
    <a class="navbar-brand" href="datenverschluesslung2.html">Datenverschlüsselung</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="datenverschluesslung2.html">Start</a></li>
        <li class="nav-item"><a class="nav-link" href="symmetrisch.html">Symmetrisch</a></li>
        <li class="nav-item"><a class="nav-link active" href="asymmetrisch.html">Asymmetrisch</a></li>
        <li class="nav-item"><a class="nav-link" href="hybrid.html">Hybrid</a></li>
        <li class="nav-item"><a class="nav-link" href="hash.html">Hash</a></li>
        <li class="nav-item"><a class="nav-link" href="notizen.html">Notizenverschlüsselung</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="app">
  <h2>🔐 Notizen</h2>

  <textarea id="noteInput" placeholder="Deine Notiz..."></textarea>
  <input id="password" placeholder="Passwort">

  <button onclick="saveNote()">Speichern</button>
  <button onclick="showNotes()">Anzeigen</button>
  <button onclick="deleteNotes()">Alle löschen</button>

  <div id="notesContainer"></div>
</div>

<script>
function encrypt(text, password) {
  let result = "";
  let shift = password.length;

  for (let i = 0; i < text.length; i++) {
    result += String.fromCharCode(text.charCodeAt(i) + shift);
  }

  return result;
}

function decrypt(text, password) {
  let result = "";
  let shift = password.length;

  for (let i = 0; i < text.length; i++) {
    result += String.fromCharCode(text.charCodeAt(i) - shift);
  }

  return result;
}

function saveNote() {
  let text = document.getElementById("noteInput").value;
  let password = document.getElementById("password").value;

  if (!text || !password) {
    alert("Bitte alles eingeben!");
    return;
  }

  let encrypted = encrypt(text, password);

  let notes = JSON.parse(localStorage.getItem("notes") || "[]");
  notes.push(encrypted);
  localStorage.setItem("notes", JSON.stringify(notes));

  alert("Gespeichert!");
  document.getElementById("noteInput").value = "";
}

function showNotes() {
  let password = document.getElementById("password").value;
  let container = document.getElementById("notesContainer");

  container.innerHTML = "";

  let notes = JSON.parse(localStorage.getItem("notes") || "[]");

  notes.forEach(n => {
    let div = document.createElement("div");
    div.className = "note";
    div.textContent = decrypt(n, password);
    container.appendChild(div);
  });
}

function deleteNotes() {
  localStorage.removeItem("notes");
  document.getElementById("notesContainer").innerHTML = "";
  alert("Alle Notizen gelöscht!");
}
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
