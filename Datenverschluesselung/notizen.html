<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notizen App mit Verschlüsselung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #222;
            color: white;
            padding-top: 80px; /* Platz für die fixed Navbar */
        }

        .card-custom {
            background: #333;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            margin: auto;
        }

        textarea, input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #444;
            color: white;
        }

        .note {
            background: #444;
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            text-align: left;
            border-left: 5px solid #4CAF50;
            word-wrap: break-word;
        }

        .btn-custom {
            background-color: #4CAF50;
            color: white;
            border: none;
        }
        
        .btn-custom:hover {
            background-color: #45a049;
            color: white;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
    <div class="container">
        <a class="navbar-brand" href="datenverschluesslung2.html">Datenverschlüsselung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="datenverschluesslung2.html">Start</a></li>
                <li class="nav-item"><a class="nav-link" href="symmetrisch.html">Symmetrisch</a></li>
                <li class="nav-item"><a class="nav-link" href="asymmetrisch.html">Asymmetrisch</a></li>
                <li class="nav-item"><a class="nav-link" href="hybrid.html">Hybrid</a></li>
                <li class="nav-item"><a class="nav-link" href="hash.html">Hash</a></li>
                <li class="nav-item"><a class="nav-link active" href="notizen.html">Notizenverschlüsselung</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card-custom text-center">
        <h1>🔐 Notizen App</h1>
        <p class="text-muted">Deine privaten Notizen im Browser-Speicher</p>

        <textarea id="noteInput" placeholder="Schreibe eine Notiz..."></textarea><br>
        <input type="password" id="password" placeholder="Passwort für die Verschlüsselung"><br>

        <div class="d-flex justify-content-center gap-2 mt-2">
            <button class="btn btn-custom" onclick="saveNote()">Speichern</button>
            <button class="btn btn-primary" onclick="showNotes()">Anzeigen</button>
            <button class="btn btn-danger" onclick="deleteNotes()">Alle löschen</button>
        </div>

        <div id="notesContainer" class="mt-4"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// =========================
// VERSCHLÜSSELUNG (Logik)
// =========================

function encrypt(text, password) {
    let result = "";
    let shift = password.length;
    for (let i = 0; i < text.length; i++) {
        result += String.fromCharCode(text.charCodeAt(i) + shift);
    }
    return result;
}

function decrypt(text, password) {
    let result = "";
    let shift = password.length;
    for (let i = 0; i < text.length; i++) {
        result += String.fromCharCode(text.charCodeAt(i) - shift);
    }
    return result;
}

function saveNote() {
    let noteText = document.getElementById("noteInput").value;
    let password = document.getElementById("password").value;

    if (noteText === "" || password === "") {
        alert("Bitte alles eingeben!");
        return;
    }

    let encryptedNote = encrypt(noteText, password);
    let notes = JSON.parse(localStorage.getItem("notes") || "[]");
    notes.push(encryptedNote);
    localStorage.setItem("notes", JSON.stringify(notes));

    alert("Notiz gespeichert!");
    document.getElementById("noteInput").value = "";
}

function showNotes() {
    let password = document.getElementById("password").value;
    let container = document.getElementById("notesContainer");

    if (password === "") {
        alert("Bitte Passwort eingeben, um zu entschlüsseln!");
        return;
    }

    container.innerHTML = "";
    let notes = JSON.parse(localStorage.getItem("notes") || "[]");

    if (notes.length === 0) {
        container.innerHTML = "<em>Keine Notizen gespeichert.</em>";
        return;
    }

    for (let i = 0; i < notes.length; i++) {
        let decrypted = decrypt(notes[i], password);
        let div = document.createElement("div");
        div.className = "note";
        div.textContent = decrypted;
        container.appendChild(div);
    }
}

function deleteNotes() {
    if (confirm("Wirklich alle Notizen löschen?")) {
        localStorage.removeItem("notes");
        document.getElementById("notesContainer").innerHTML = "";
        alert("Alle Notizen gelöscht!");
    }
}
</script>

</body>
</html>
